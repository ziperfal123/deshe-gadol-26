name: Deploy to GitHub Pages

on:
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Rebuild + deploy on every push to main.
  push:
    branches: [main]
  # NOTE: the scheduled auto-sync was disabled for the tournament finale —
  # results are being finalized manually. Re-enable by restoring a `schedule:`
  # block here if live auto-refresh is ever wanted again.

# Least-privilege permissions required for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment. Do not cancel an
# in-progress deploy: let it finish to avoid a half-published site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Refresh computed data from live results. The generator uses
      # only the Python standard library (no pip install needed).
      # If the fetch fails in CI (e.g. ESPN unreachable), continue the
      # build using whatever data/public is committed in the repo.
      - name: Regenerate public data
        continue-on-error: true
        run: python3 scripts/gen_public.py

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      # npm run build runs sync:data (copies data/public -> web/public/data)
      # then tsc -b && vite build, emitting the static site to web/dist.
      - name: Build web app
        working-directory: web
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
